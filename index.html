<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <title>Lecteur YouTube</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .message {
      box-sizing: border-box;
      display: flex;
      width: 100%;
      height: 100%;
      padding: 30px;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <script>
    "use strict";

    const BRIDGE_CHANNEL = "focus-hub-youtube";
    const params = new URLSearchParams(window.location.search);
    const rawPlaylistId = params.get("playlist") || "";
    const rawVideoId = params.get("video") || "";
    const playlistIdPattern = /^[A-Za-z0-9_-]{6,120}$/;
    const videoIdPattern = /^[A-Za-z0-9_-]{11}$/;
    let playlistId = playlistIdPattern.test(rawPlaylistId) ? rawPlaylistId : "";
    let videoId = videoIdPattern.test(rawVideoId) ? rawVideoId : "";
    let mediaType = playlistId ? "playlist" : (videoId ? "video" : "");
    const initialPlaylistIndex = Math.max(0, Number.parseInt(params.get("index") || "0", 10) || 0);
    const playerContainer = document.getElementById("player");
    let presentationMode = params.get("presentation") === "background" ? "background" : "mini";

    let player = null;
    let playerReady = false;
    let playerGeneration = 0;
    let loopEnabled = false;
    let shuffleEnabled = false;
    let playbackIntent = false;
    let playlistPosition = initialPlaylistIndex;
    let parentOrigin = "*";
    let lastVolumeSignature = "";
    let playerResizeFrame = 0;
    let lastPlayerSize = "";
    let playlistEndedTimer = 0;
    let playlistEndedRecoveryTimer = 0;
    let playlistEndedSequence = 0;
    const pendingCommands = [];

    try {
      const referrerOrigin = document.referrer ? new URL(document.referrer).origin : "";
      if (/^http:\/\/(127\.0\.0\.1|localhost):\d+$/.test(referrerOrigin)) {
        parentOrigin = referrerOrigin;
      }
    } catch {
      parentOrigin = "*";
    }

    function postBridgeEvent(event, data = {}) {
      if (window.parent === window) return;
      window.parent.postMessage({
        channel: BRIDGE_CHANNEL,
        kind: "event",
        event,
        mediaType,
        videoId,
        playlistId,
        data,
      }, parentOrigin);
    }

    function getCurrentVideoId() {
      const videoDataId = String(player?.getVideoData?.()?.video_id || "");
      if (videoIdPattern.test(videoDataId)) return videoDataId;
      try {
        const playerUrl = new URL(String(player?.getVideoUrl?.() || ""));
        const urlId = String(playerUrl.searchParams.get("v") || "");
        return videoIdPattern.test(urlId) ? urlId : "";
      } catch {
        return "";
      }
    }

    function getPlayerSnapshot() {
      if (!playerReady || !player) return {};
      const videoData = player.getVideoData?.() || {};
      const playlist = player.getPlaylist?.();
      const reportedPlaylistIndex = Number(player.getPlaylistIndex?.());
      if (Number.isFinite(reportedPlaylistIndex) && reportedPlaylistIndex >= 0) {
        playlistPosition = reportedPlaylistIndex;
      }
      return {
        state: player.getPlayerState?.(),
        shouldPlay: playbackIntent || player.getPlayerState?.() === 1 || player.getPlayerState?.() === 3,
        volume: player.getVolume?.(),
        muted: !!player.isMuted?.(),
        playlistIndex: playlistPosition,
        playlistLength: Array.isArray(playlist) ? playlist.length : 0,
        playlist: Array.isArray(playlist) ? playlist : [],
        currentVideoId: getCurrentVideoId(),
        currentTime: Math.max(0, Number(player.getCurrentTime?.()) || 0),
        title: videoData.title || "",
        author: videoData.author || "",
      };
    }

    function publishState(event = "state") {
      postBridgeEvent(event, getPlayerSnapshot());
    }

    function clearPlaylistEndedRecovery() {
      window.clearTimeout(playlistEndedTimer);
      window.clearTimeout(playlistEndedRecoveryTimer);
      playlistEndedTimer = 0;
      playlistEndedRecoveryTimer = 0;
      playlistEndedSequence += 1;
    }

    function getSafePlaylistState() {
      const playlist = player?.getPlaylist?.();
      const index = Number(player?.getPlaylistIndex?.());
      return {
        playlist: Array.isArray(playlist) ? playlist : [],
        index: Number.isFinite(index) && index >= 0 ? Math.floor(index) : Math.max(0, playlistPosition),
        videoId: getCurrentVideoId(),
      };
    }

    function advancePlaylistAfterEnded(expectedGeneration, expectedSequence, endedState) {
      if (
        expectedGeneration !== playerGeneration ||
        expectedSequence !== playlistEndedSequence ||
        !playerReady ||
        !player ||
        mediaType !== "playlist" ||
        !playbackIntent ||
        ![-1, 0, 2, 5].includes(player.getPlayerState?.())
      ) return;

      const current = getSafePlaylistState();
      if (
        (endedState.videoId && current.videoId && endedState.videoId !== current.videoId) ||
        current.index !== endedState.index
      ) return;

      const length = current.playlist.length;
      if (length && current.index >= length - 1 && !loopEnabled) {
        playbackIntent = false;
        publishState("state");
        return;
      }

      playbackIntent = true;
      const nextIndex = length ? (current.index + 1) % length : current.index + 1;
      playlistPosition = nextIndex;
      if (length) player.playVideoAt?.(nextIndex);
      else player.nextVideo?.();

      playlistEndedRecoveryTimer = window.setTimeout(() => {
        playlistEndedRecoveryTimer = 0;
        if (
          expectedGeneration !== playerGeneration ||
          expectedSequence !== playlistEndedSequence ||
          !playerReady ||
          !player ||
          !playbackIntent ||
          ![-1, 0, 2, 5].includes(player.getPlayerState?.())
        ) return;
        if (length) {
          player.playVideoAt?.(nextIndex);
          player.playVideo?.();
        } else if (playlistId) {
          player.loadPlaylist?.({
            listType: "playlist",
            list: playlistId,
            index: nextIndex,
            startSeconds: 0,
          });
        }
      }, 1400);
    }

    function schedulePlaylistEndedRecovery(generation) {
      clearPlaylistEndedRecovery();
      if (mediaType !== "playlist" || !playbackIntent) return;
      const sequence = playlistEndedSequence;
      const endedState = getSafePlaylistState();
      playlistEndedTimer = window.setTimeout(() => {
        playlistEndedTimer = 0;
        advancePlaylistAfterEnded(generation, sequence, endedState);
      }, 850);
    }

    function resizePlayer(requestedSize = null) {
      if (!playerReady || !player?.setSize) return false;
      const requestedWidth = Number(requestedSize?.width);
      const requestedHeight = Number(requestedSize?.height);
      const width = Math.max(1, Math.round(
        Number.isFinite(requestedWidth) && requestedWidth > 0
          ? requestedWidth
          : document.documentElement.clientWidth || window.innerWidth || 1
      ));
      const height = Math.max(1, Math.round(
        Number.isFinite(requestedHeight) && requestedHeight > 0
          ? requestedHeight
          : document.documentElement.clientHeight || window.innerHeight || 1
      ));
      const signature = `${width}x${height}`;
      if (signature === lastPlayerSize) return false;
      lastPlayerSize = signature;
      player.setSize(width, height);
      return true;
    }

    function schedulePlayerResize(requestedSize = null) {
      if (playerResizeFrame) cancelAnimationFrame(playerResizeFrame);
      playerResizeFrame = requestAnimationFrame(() => {
        playerResizeFrame = 0;
        resizePlayer(requestedSize);
      });
    }

    function executeCommand(message) {
      if (!playerReady || !player) {
        pendingCommands.push(message);
        return;
      }
      const command = String(message.command || "");
      const value = message.value;
      switch (command) {
        case "loadMedia": {
          clearPlaylistEndedRecovery();
          const nextType = value?.type === "playlist" ? "playlist" : "video";
          const nextPlaylistId = playlistIdPattern.test(String(value?.playlistId || ""))
            ? String(value.playlistId)
            : "";
          const nextVideoId = videoIdPattern.test(String(value?.videoId || ""))
            ? String(value.videoId)
            : "";
          const nextPlaylistIds = Array.isArray(value?.playlistIds)
            ? value.playlistIds.map((id) => String(id || "")).filter((id) => videoIdPattern.test(id)).slice(0, 1000)
            : [];
          const autoplay = value?.autoplay !== false;
          playbackIntent = autoplay;
          if (nextType === "playlist" && nextPlaylistId) {
            mediaType = "playlist";
            playlistId = nextPlaylistId;
            videoId = "";
            playlistPosition = Math.max(0, Number(value?.index) || 0);
            if (nextPlaylistIds.length) {
              playlistPosition = Math.min(playlistPosition, nextPlaylistIds.length - 1);
              if (autoplay) player.loadPlaylist?.(nextPlaylistIds, playlistPosition, 0);
              else player.cuePlaylist?.(nextPlaylistIds, playlistPosition, 0);
            } else {
              const playlistCommand = {
                listType: "playlist",
                list: playlistId,
                index: playlistPosition,
                startSeconds: 0,
              };
              if (autoplay) player.loadPlaylist?.(playlistCommand);
              else player.cuePlaylist?.(playlistCommand);
            }
          } else if (nextVideoId) {
            mediaType = "video";
            videoId = nextVideoId;
            playlistId = "";
            if (autoplay) player.loadVideoById?.(videoId);
            else player.cueVideoById?.(videoId);
          } else {
            postBridgeEvent("error", { code: 2, message: "Identifiant YouTube invalide" });
            return;
          }
          break;
        }
        case "play":
          playbackIntent = true;
          player.playVideo?.();
          break;
        case "pause":
          playbackIntent = false;
          player.pauseVideo?.();
          break;
        case "toggle":
          playbackIntent = player.getPlayerState?.() !== 1;
          if (playbackIntent) player.playVideo?.();
          else player.pauseVideo?.();
          break;
        case "next":
          clearPlaylistEndedRecovery();
          playbackIntent = true;
          if (mediaType === "playlist") {
            const playlist = player.getPlaylist?.();
            if (shuffleEnabled && Array.isArray(playlist) && playlist.length) {
              player.nextVideo?.();
            } else {
              playlistPosition += 1;
              if (Array.isArray(playlist) && playlist.length) {
                player.playVideoAt?.(playlistPosition % playlist.length);
              } else {
                player.loadPlaylist?.({
                  listType: "playlist",
                  list: playlistId,
                  index: playlistPosition,
                  startSeconds: 0,
                });
              }
            }
          } else {
            player.nextVideo?.();
          }
          break;
        case "previous":
          clearPlaylistEndedRecovery();
          playbackIntent = true;
          if (mediaType === "playlist") {
            const playlist = player.getPlaylist?.();
            if (shuffleEnabled && Array.isArray(playlist) && playlist.length) {
              player.previousVideo?.();
            } else {
              playlistPosition = Math.max(0, playlistPosition - 1);
              if (Array.isArray(playlist) && playlist.length) {
                player.playVideoAt?.(playlistPosition % playlist.length);
              } else {
                player.loadPlaylist?.({
                  listType: "playlist",
                  list: playlistId,
                  index: playlistPosition,
                  startSeconds: 0,
                });
              }
            }
          } else {
            player.previousVideo?.();
          }
          break;
        case "first": {
          clearPlaylistEndedRecovery();
          if (mediaType !== "playlist" || !playlistId) break;
          playbackIntent = true;
          playlistPosition = 0;
          const playlist = player.getPlaylist?.();
          if (Array.isArray(playlist) && playlist.length) {
            player.playVideoAt?.(0);
          } else {
            player.loadPlaylist?.({
              listType: "playlist",
              list: playlistId,
              index: 0,
              startSeconds: 0,
            });
          }
          break;
        }
        case "restart":
          playbackIntent = true;
          player.seekTo?.(0, true);
          player.playVideo?.();
          break;
        case "setVolume":
          player.setVolume?.(Math.max(0, Math.min(100, Number(value) || 0)));
          break;
        case "setMuted":
          if (value) player.mute?.();
          else player.unMute?.();
          break;
        case "setLoop":
          loopEnabled = !!value;
          if (mediaType === "playlist") player.setLoop?.(loopEnabled);
          break;
        case "setShuffle":
          shuffleEnabled = !!value;
          if (mediaType === "playlist") player.setShuffle?.(shuffleEnabled);
          break;
        case "setPresentationMode":
          recreatePlayerForPresentation(value === "background" ? "background" : "mini");
          return;
        case "setViewportSize":
          schedulePlayerResize(value);
          return;
        case "getState":
          publishState("snapshot");
          return;
        default:
          return;
      }
      window.setTimeout(() => publishState("snapshot"), 80);
    }

    window.addEventListener("message", (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.channel !== BRIDGE_CHANNEL || message.kind !== "command") return;
      if (parentOrigin !== "*" && event.origin !== parentOrigin) return;
      if (parentOrigin === "*" && /^http:\/\/(127\.0\.0\.1|localhost):\d+$/.test(event.origin)) {
        parentOrigin = event.origin;
      }
      executeCommand(message);
    });

    function restorePlayerSnapshot(snapshot) {
      if (!snapshot || !player) return;
      const index = Math.max(0, Number(snapshot.playlistIndex) || 0);
      const startSeconds = Math.max(0, Number(snapshot.currentTime) || 0);
      const shouldPlay = snapshot.shouldPlay === true || snapshot.state === 1 || snapshot.state === 3;
      playbackIntent = shouldPlay;
      if (mediaType === "playlist" && playlistId) {
        const playlist = Array.isArray(snapshot.playlist)
          ? snapshot.playlist.filter((id) => videoIdPattern.test(String(id || "")))
          : [];
        const command = playlist.length
          ? [playlist, Math.min(index, playlist.length - 1), startSeconds]
          : [{ listType: "playlist", list: playlistId, index, startSeconds }];
        if (shouldPlay) player.loadPlaylist?.(...command);
        else player.cuePlaylist?.(...command);
      } else {
        const currentId = videoIdPattern.test(String(snapshot.currentVideoId || ""))
          ? String(snapshot.currentVideoId)
          : videoId;
        if (currentId) {
          const command = { videoId: currentId, startSeconds };
          if (shouldPlay) player.loadVideoById?.(command);
          else player.cueVideoById?.(command);
        }
      }
      player.setVolume?.(Math.max(0, Math.min(100, Number(snapshot.volume) || 0)));
      if (snapshot.muted) player.mute?.();
      else player.unMute?.();
      if (mediaType === "playlist") {
        player.setLoop?.(loopEnabled);
        player.setShuffle?.(shuffleEnabled);
      }
    }

    function onPlayerReady(generation, restoreSnapshot = null) {
      if (generation !== playerGeneration) return;
      playerReady = true;
      const iframe = player.getIframe?.();
      if (iframe) {
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share");
      }
      resizePlayer();
      restorePlayerSnapshot(restoreSnapshot);
      postBridgeEvent("ready", getPlayerSnapshot());
      while (pendingCommands.length) executeCommand(pendingCommands.shift());
    }

    function onPlayerStateChange(event, generation) {
      if (generation !== playerGeneration) return;
      const reportedPlaylistIndex = Number(player?.getPlaylistIndex?.());
      if (mediaType === "playlist" && Number.isFinite(reportedPlaylistIndex) && reportedPlaylistIndex >= 0) {
        playlistPosition = reportedPlaylistIndex;
      }
      if (event.data === 1) playbackIntent = true;
      if (event.data === 2) playbackIntent = false;
      if (event.data === 0 && mediaType === "video" && loopEnabled) {
        playbackIntent = true;
        player.seekTo?.(0, true);
        player.playVideo?.();
      }
      if (event.data === 0 && mediaType === "playlist") {
        schedulePlaylistEndedRecovery(generation);
      } else if (event.data === 1 || event.data === 2 || event.data === 3) {
        clearPlaylistEndedRecovery();
      }
      publishState("state");
    }

    function onPlayerError(event, generation) {
      if (generation !== playerGeneration) return;
      postBridgeEvent("error", {
        ...getPlayerSnapshot(),
        code: Number(event.data) || 0,
      });
    }

    function ensurePlayerTarget() {
      if (document.getElementById("player")) return;
      const target = document.createElement("div");
      target.id = "player";
      document.body.prepend(target);
    }

    function createYoutubePlayer(restoreSnapshot = null) {
      ensurePlayerTarget();
      const generation = ++playerGeneration;
      const config = {
        width: "100%",
        height: "100%",
        playerVars: {
          playsinline: 1,
          rel: 0,
          controls: presentationMode === "background" ? 0 : 1,
          disablekb: presentationMode === "background" ? 1 : 0,
          enablejsapi: 1,
        },
        events: {
          onReady: () => onPlayerReady(generation, restoreSnapshot),
          onStateChange: (event) => onPlayerStateChange(event, generation),
          onError: (event) => onPlayerError(event, generation),
        },
      };
      if (!restoreSnapshot && mediaType === "playlist") {
        config.playerVars.listType = "playlist";
        config.playerVars.list = playlistId;
        config.playerVars.index = playlistPosition;
        if (videoId) config.videoId = videoId;
      } else if (!restoreSnapshot) {
        config.videoId = videoId;
      }
      player = new YT.Player("player", config);
    }

    function recreatePlayerForPresentation(nextMode) {
      if (nextMode === presentationMode) return;
      clearPlaylistEndedRecovery();
      const snapshot = getPlayerSnapshot();
      presentationMode = nextMode;
      playerReady = false;
      const previousPlayer = player;
      player = null;
      ++playerGeneration;
      try {
        previousPlayer?.destroy?.();
      } catch {
        // Le nouveau lecteur remplacera proprement toute ancienne iframe restante.
      }
      ensurePlayerTarget();
      createYoutubePlayer(snapshot);
    }

    window.onYouTubeIframeAPIReady = function () {
      createYoutubePlayer();
    };

    window.addEventListener("resize", () => schedulePlayerResize());
    window.visualViewport?.addEventListener("resize", () => schedulePlayerResize());
    if (typeof ResizeObserver === "function") {
      const resizeObserver = new ResizeObserver(() => schedulePlayerResize());
      resizeObserver.observe(document.documentElement);
    }

    if (!mediaType) {
      playerContainer.innerHTML = '<div class="message">Aucune vidéo ou playlist valide n’a été fournie.</div>';
      postBridgeEvent("error", { code: 2, message: "Identifiant YouTube invalide" });
    } else {
      const script = document.createElement("script");
      script.src = "https://www.youtube.com/iframe_api";
      script.referrerPolicy = "strict-origin-when-cross-origin";
      script.onerror = () => postBridgeEvent("error", { code: 5, message: "API YouTube inaccessible" });
      document.head.appendChild(script);
      window.setInterval(() => {
        if (!playerReady || !player) return;
        const signature = `${player.getVolume?.()}-${!!player.isMuted?.()}`;
        if (signature === lastVolumeSignature) return;
        lastVolumeSignature = signature;
        publishState("volume");
      }, 500);
    }
  </script>
</body>
</html>
