<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <title>Test playlist YouTube</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .player {
      width: min(900px, 95vw);
      aspect-ratio: 16 / 9;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>

<body>
  <h1>Test playlist YouTube</h1>

  <div class="player">
    <iframe
      src="https://www.youtube.com/embed/videoseries?list=PLXdlx7C4t4hMP6bi2FbiNDRa8py6j0IiH"
      title="Playlist YouTube"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen>
    </iframe>
  </div>
</body>
</html>
