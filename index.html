<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <title>Lecteur YouTube</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .message {
      box-sizing: border-box;
      display: flex;
      width: 100%;
      height: 100%;
      padding: 30px;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const playlistId = params.get("playlist");
    const videoId = params.get("video");

    const playerContainer = document.getElementById("player");

    const playlistIdPattern = /^[A-Za-z0-9_-]{10,80}$/;
    const videoIdPattern = /^[A-Za-z0-9_-]{11}$/;

    let embedUrl = "";

    if (playlistId && playlistIdPattern.test(playlistId)) {
      embedUrl =
        "https://www.youtube.com/embed/videoseries?list=" +
        encodeURIComponent(playlistId);
    } else if (videoId && videoIdPattern.test(videoId)) {
      embedUrl =
        "https://www.youtube.com/embed/" +
        encodeURIComponent(videoId);
    }

    if (!embedUrl) {
      playerContainer.innerHTML = `
        <div class="message">
          Aucune vidéo ou playlist valide n’a été fournie.
        </div>
      `;
    } else {
      const iframe = document.createElement("iframe");

      iframe.src = embedUrl;
      iframe.title = "Lecteur YouTube";
      iframe.referrerPolicy = "strict-origin-when-cross-origin";

      iframe.allow =
        "accelerometer; autoplay; clipboard-write; encrypted-media; " +
        "gyroscope; picture-in-picture; web-share";

      iframe.allowFullscreen = true;

      playerContainer.appendChild(iframe);
    }
  </script>
</body>
</html>
