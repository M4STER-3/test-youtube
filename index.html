<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="referrer"
    content="strict-origin-when-cross-origin"
  >

  <title>Lecteur YouTube</title>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .message {
      box-sizing: border-box;
      display: flex;
      width: 100%;
      height: 100%;
      padding: 30px;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="player"></div>

  <script>
    "use strict";

    const BRIDGE_CHANNEL = "focus-hub-youtube";
    const params = new URLSearchParams(window.location.search);
    const rawPlaylistId = params.get("playlist") || "";
    const rawVideoId = params.get("video") || "";
    const playlistIdPattern = /^[A-Za-z0-9_-]{6,120}$/;
    const videoIdPattern = /^[A-Za-z0-9_-]{11}$/;
    let playlistId = playlistIdPattern.test(rawPlaylistId) ? rawPlaylistId : "";
    let videoId = videoIdPattern.test(rawVideoId) ? rawVideoId : "";
    let mediaType = playlistId ? "playlist" : (videoId ? "video" : "");
    const initialPlaylistIndex = Math.max(0, Number.parseInt(params.get("index") || "0", 10) || 0);
    const playerContainer = document.getElementById("player");

    let player = null;
    let playerReady = false;
    let loopEnabled = false;
    let shuffleEnabled = false;
    let playlistPosition = initialPlaylistIndex;
    let parentOrigin = "*";
    let lastVolumeSignature = "";
    const pendingCommands = [];

    try {
      const referrerOrigin = document.referrer ? new URL(document.referrer).origin : "";
      if (/^http:\/\/(127\.0\.0\.1|localhost):\d+$/.test(referrerOrigin)) {
        parentOrigin = referrerOrigin;
      }
    } catch {
      parentOrigin = "*";
    }

    function postBridgeEvent(event, data = {}) {
      if (window.parent === window) return;
      window.parent.postMessage({
        channel: BRIDGE_CHANNEL,
        kind: "event",
        event,
        mediaType,
        videoId,
        playlistId,
        data,
      }, parentOrigin);
    }

    function getCurrentVideoId() {
      const videoDataId = String(player?.getVideoData?.()?.video_id || "");
      if (videoIdPattern.test(videoDataId)) return videoDataId;
      try {
        const playerUrl = new URL(String(player?.getVideoUrl?.() || ""));
        const urlId = String(playerUrl.searchParams.get("v") || "");
        return videoIdPattern.test(urlId) ? urlId : "";
      } catch {
        return "";
      }
    }

    function getPlayerSnapshot() {
      if (!playerReady || !player) return {};
      const videoData = player.getVideoData?.() || {};
      const playlist = player.getPlaylist?.();
      const reportedPlaylistIndex = Number(player.getPlaylistIndex?.());
      if (Number.isFinite(reportedPlaylistIndex) && reportedPlaylistIndex >= 0) {
        playlistPosition = reportedPlaylistIndex;
      }
      return {
        state: player.getPlayerState?.(),
        volume: player.getVolume?.(),
        muted: !!player.isMuted?.(),
        playlistIndex: playlistPosition,
        playlistLength: Array.isArray(playlist) ? playlist.length : 0,
        playlist: Array.isArray(playlist) ? playlist : [],
        currentVideoId: getCurrentVideoId(),
        title: videoData.title || "",
        author: videoData.author || "",
      };
    }

    function publishState(event = "state") {
      postBridgeEvent(event, getPlayerSnapshot());
    }

    function executeCommand(message) {
      if (!playerReady || !player) {
        pendingCommands.push(message);
        return;
      }
      const command = String(message.command || "");
      const value = message.value;
      switch (command) {
        case "loadMedia": {
          const nextType = value?.type === "playlist" ? "playlist" : "video";
          const nextPlaylistId = playlistIdPattern.test(String(value?.playlistId || ""))
            ? String(value.playlistId)
            : "";
          const nextVideoId = videoIdPattern.test(String(value?.videoId || ""))
            ? String(value.videoId)
            : "";
          const autoplay = value?.autoplay !== false;
          if (nextType === "playlist" && nextPlaylistId) {
            mediaType = "playlist";
            playlistId = nextPlaylistId;
            videoId = "";
            playlistPosition = Math.max(0, Number(value?.index) || 0);
            const playlistCommand = {
              listType: "playlist",
              list: playlistId,
              index: playlistPosition,
              startSeconds: 0,
            };
            if (autoplay) player.loadPlaylist?.(playlistCommand);
            else player.cuePlaylist?.(playlistCommand);
          } else if (nextVideoId) {
            mediaType = "video";
            videoId = nextVideoId;
            playlistId = "";
            if (autoplay) player.loadVideoById?.(videoId);
            else player.cueVideoById?.(videoId);
          } else {
            postBridgeEvent("error", { code: 2, message: "Identifiant YouTube invalide" });
            return;
          }
          break;
        }
        case "play":
          player.playVideo?.();
          break;
        case "pause":
          player.pauseVideo?.();
          break;
        case "toggle":
          if (player.getPlayerState?.() === 1) player.pauseVideo?.();
          else player.playVideo?.();
          break;
        case "next":
          if (mediaType === "playlist") {
            const playlist = player.getPlaylist?.();
            if (shuffleEnabled && Array.isArray(playlist) && playlist.length) {
              player.nextVideo?.();
            } else {
              playlistPosition += 1;
              if (Array.isArray(playlist) && playlist.length) {
                player.playVideoAt?.(playlistPosition % playlist.length);
              } else {
                player.loadPlaylist?.({
                  listType: "playlist",
                  list: playlistId,
                  index: playlistPosition,
                  startSeconds: 0,
                });
              }
            }
          } else {
            player.nextVideo?.();
          }
          break;
        case "previous":
          if (mediaType === "playlist") {
            const playlist = player.getPlaylist?.();
            if (shuffleEnabled && Array.isArray(playlist) && playlist.length) {
              player.previousVideo?.();
            } else {
              playlistPosition = Math.max(0, playlistPosition - 1);
              if (Array.isArray(playlist) && playlist.length) {
                player.playVideoAt?.(playlistPosition % playlist.length);
              } else {
                player.loadPlaylist?.({
                  listType: "playlist",
                  list: playlistId,
                  index: playlistPosition,
                  startSeconds: 0,
                });
              }
            }
          } else {
            player.previousVideo?.();
          }
          break;
        case "first": {
          if (mediaType !== "playlist" || !playlistId) break;
          playlistPosition = 0;
          const playlist = player.getPlaylist?.();
          if (Array.isArray(playlist) && playlist.length) {
            player.playVideoAt?.(0);
          } else {
            player.loadPlaylist?.({
              listType: "playlist",
              list: playlistId,
              index: 0,
              startSeconds: 0,
            });
          }
          break;
        }
        case "restart":
          player.seekTo?.(0, true);
          player.playVideo?.();
          break;
        case "setVolume":
          player.setVolume?.(Math.max(0, Math.min(100, Number(value) || 0)));
          break;
        case "setMuted":
          if (value) player.mute?.();
          else player.unMute?.();
          break;
        case "setLoop":
          loopEnabled = !!value;
          if (mediaType === "playlist") player.setLoop?.(loopEnabled);
          break;
        case "setShuffle":
          shuffleEnabled = !!value;
          if (mediaType === "playlist") player.setShuffle?.(shuffleEnabled);
          break;
        case "getState":
          publishState("snapshot");
          return;
        default:
          return;
      }
      window.setTimeout(() => publishState("snapshot"), 80);
    }

    window.addEventListener("message", (event) => {
      if (event.source !== window.parent) return;
      const message = event.data;
      if (!message || message.channel !== BRIDGE_CHANNEL || message.kind !== "command") return;
      if (parentOrigin !== "*" && event.origin !== parentOrigin) return;
      if (parentOrigin === "*" && /^http:\/\/(127\.0\.0\.1|localhost):\d+$/.test(event.origin)) {
        parentOrigin = event.origin;
      }
      executeCommand(message);
    });

    function onPlayerReady() {
      playerReady = true;
      const iframe = player.getIframe?.();
      if (iframe) {
        iframe.referrerPolicy = "strict-origin-when-cross-origin";
        iframe.setAttribute("allow", "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share");
      }
      postBridgeEvent("ready", getPlayerSnapshot());
      while (pendingCommands.length) executeCommand(pendingCommands.shift());
    }

    function onPlayerStateChange(event) {
      const reportedPlaylistIndex = Number(player?.getPlaylistIndex?.());
      if (mediaType === "playlist" && Number.isFinite(reportedPlaylistIndex) && reportedPlaylistIndex >= 0) {
        playlistPosition = reportedPlaylistIndex;
      }
      if (event.data === 0 && mediaType === "video" && loopEnabled) {
        player.seekTo?.(0, true);
        player.playVideo?.();
      }
      publishState("state");
    }

    function onPlayerError(event) {
      postBridgeEvent("error", {
        ...getPlayerSnapshot(),
        code: Number(event.data) || 0,
      });
    }

    window.onYouTubeIframeAPIReady = function () {
      const config = {
        width: "100%",
        height: "100%",
        playerVars: {
          playsinline: 1,
          rel: 0,
          controls: 1,
          enablejsapi: 1,
        },
        events: {
          onReady: onPlayerReady,
          onStateChange: onPlayerStateChange,
          onError: onPlayerError,
        },
      };
      if (mediaType === "playlist") {
        config.playerVars.listType = "playlist";
        config.playerVars.list = playlistId;
        config.playerVars.index = playlistPosition;
        if (videoId) config.videoId = videoId;
      } else {
        config.videoId = videoId;
      }
      player = new YT.Player("player", config);
    };

    if (!mediaType) {
      playerContainer.innerHTML = '<div class="message">Aucune vidéo ou playlist valide n’a été fournie.</div>';
      postBridgeEvent("error", { code: 2, message: "Identifiant YouTube invalide" });
    } else {
      const script = document.createElement("script");
      script.src = "https://www.youtube.com/iframe_api";
      script.referrerPolicy = "strict-origin-when-cross-origin";
      script.onerror = () => postBridgeEvent("error", { code: 5, message: "API YouTube inaccessible" });
      document.head.appendChild(script);
      window.setInterval(() => {
        if (!playerReady || !player) return;
        const signature = `${player.getVolume?.()}-${!!player.isMuted?.()}`;
        if (signature === lastVolumeSignature) return;
        lastVolumeSignature = signature;
        publishState("volume");
      }, 500);
    }
  </script>
</body>
</html>
